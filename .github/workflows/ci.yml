name: cab-booking-ci

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  compliance-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run cloud-native and security compliance gate
        run: npm run ci:compliance

      - name: Validate OpenAPI generation and drift checks
        run: npm run ci:openapi

      - name: Validate realtime smoke script wiring
        run: npm run smoke:realtime:dry

  manifests-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests
        run: kubectl kustomize --load-restrictor=LoadRestrictionsNone k8s/base > /tmp/cab-booking-k8s.yaml

  functional-smoke-main-develop:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [compliance-gate, manifests-lint]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Start development stack
        run: |
          docker compose --profile development up -d \
            postgres mongodb redis rabbitmq \
            auth-service user-service booking-service driver-service pricing-service payment-service notification-service eta-service matching-service \
            ride-service realtime-socket

      - name: Run level1 smoke
        run: npm run smoke:level1

      - name: Run level2 smoke
        run: npm run smoke:level2

      - name: Run level3 smoke
        run: npm run smoke:level3

      - name: Run level4 smoke
        run: npm run smoke:level4

      - name: Run level5 smoke
        run: npm run smoke:level5

      - name: Run level6 smoke
        run: npm run smoke:level6

      - name: Run level7 smoke
        run: npm run smoke:level7

      - name: Run level8 smoke
        run: npm run smoke:level8

      - name: Run level9 smoke
        run: npm run smoke:level9

      - name: Run level10 smoke
        run: npm run smoke:level10

      - name: Run strict realtime smoke
        run: npm run smoke:realtime:strict

      - name: Dump compose status and logs on failure
        if: failure()
        run: |
          docker compose --profile development ps
          docker compose --profile development logs --tail=250

      - name: Stop and cleanup stack
        if: always()
        run: docker compose --profile development down -v

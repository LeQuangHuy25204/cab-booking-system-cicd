apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: cab-booking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/example/cab-booking-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: cab-booking-config
            - secretRef:
                name: cab-booking-secrets
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 600m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /auth/health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /auth/health
              port: 3004
            initialDelaySeconds: 20
            periodSeconds: 20

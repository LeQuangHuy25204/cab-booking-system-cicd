apiVersion: apps/v1
kind: Deployment
metadata:
  name: ride-service
  namespace: cab-booking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ride-service
  template:
    metadata:
      labels:
        app: ride-service
    spec:
      containers:
        - name: ride-service
          image: ghcr.io/example/cab-booking-ride-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3009
          envFrom:
            - configMapRef:
                name: cab-booking-config
            - secretRef:
                name: cab-booking-secrets
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 800m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 3009
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3009
            initialDelaySeconds: 20
            periodSeconds: 20

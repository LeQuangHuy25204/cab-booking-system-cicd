apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: cab-booking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: ghcr.io/example/cab-booking-booking-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: cab-booking-config
            - secretRef:
                name: cab-booking-secrets
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 900m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/bookings/health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/bookings/health
              port: 3003
            initialDelaySeconds: 20
            periodSeconds: 20

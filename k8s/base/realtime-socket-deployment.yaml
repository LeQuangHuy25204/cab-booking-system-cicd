apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-socket
  namespace: cab-booking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realtime-socket
  template:
    metadata:
      labels:
        app: realtime-socket
    spec:
      containers:
        - name: realtime-socket
          image: ghcr.io/example/cab-booking-realtime-socket:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3011
          envFrom:
            - configMapRef:
                name: cab-booking-config
            - secretRef:
                name: cab-booking-secrets
          env:
            - name: SOCKET_AUTH_REQUIRED
              value: "true"
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 600m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3011
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3011
            initialDelaySeconds: 20
            periodSeconds: 20
